<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home page</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background-color:#000000;
            color: white;
            min-height:100vh;
            display: flex;
            flex-direction: column;
        }

        header, footer{
            background-color: #1a1a1a; 
            padding: 20px; 
            text-align: center;
        }

        main {
            flex: 1;
            padding: 20px;
        }

        h1,h2,h3{
            margin-top: 40px;
            text-align: center;
            color: #00ffcc;
        }

        a {
            color: #03ffc8;
            text-decoration: none; 
            font-weight: bold;
        }

        a:hover {
            color: rgb(251, 255, 0);
        }

        .container {
            max-width: 900px;
            margin: 0 auto; 
            padding: 0 20px;
        }

        .card {
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            width: 100%;
            transition: 0.3s;
        }
        .projetos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .projeto {
            background-color: #1a1a1a;
            color: black;
        }

        .projeto:hover {
            transform: scale(1.05);
            filter: brightness(0.9);
        }

        .projeto h3 {
            text-align: center;
        }

        .projeto p {
            text-align: left;
        }

    </style>
</head>
